<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Monitoramento Profissional - Farmácia</title>
    <style>
        /* Design Premium Glassmorphism e Tema Escuro Futurista */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #08090D;
            color: #F3F4F6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Premium com Blur de Fundo */
        header {
            background: rgba(18, 20, 29, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 1.6rem;
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 2px rgba(59, 130, 246, 0.5)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.8)); transform: scale(1.05); }
        }

        .logo-container h1 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #FFFFFF 30%, #9CA3AF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .server-badge {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: #3B82F6;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 9999px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .server-connected {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.2);
            color: #10B981;
        }

        /* Relógio Digital Moderno */
        .live-clock {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            color: #9CA3AF;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Botões Estilizados */
        button {
            background: rgba(255, 255, 255, 0.03);
            color: #E5E7EB;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        button.primary {
            background: #3B82F6;
            color: #FFFFFF;
            border: none;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
        }

        button.primary:hover {
            background: #2563EB;
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        /* Configurações Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 320px;
            height: 100vh;
            background: rgba(18, 20, 29, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            z-index: 100;
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar.active {
            right: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 15px;
        }

        .sidebar-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .close-btn {
            font-size: 1.2rem;
            cursor: pointer;
            color: #9CA3AF;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #FFFFFF;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group input, .input-group select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #F3F4F6;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #3B82F6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        /* Container Principal do Monitor */
        main {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Grid de Câmeras */
        .camera-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            padding: 20px;
            align-content: start;
        }

        /* Classes para controle de colunas manuais */
        .grid-1-col { grid-template-columns: 1fr !important; }
        .grid-2-col { grid-template-columns: repeat(2, 1fr) !important; }
        .grid-3-col { grid-template-columns: repeat(3, 1fr) !important; }

        @media (max-width: 900px) {
            .camera-grid {
                grid-template-columns: 1fr !important;
                padding: 10px;
                gap: 10px;
            }
        }

        /* Card de Câmera Premium */
        .camera-card {
            background: rgba(22, 24, 34, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .camera-card:hover {
            border-color: rgba(59, 130, 246, 0.2);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }

        /* Barra de Título do Card */
        .camera-titlebar {
            background: rgba(31, 41, 55, 0.3);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .camera-name {
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: #E5E7EB;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #10B981;
            border-radius: 50%;
            animation: pulse-dot-glow 1.5s infinite ease-in-out;
        }

        @keyframes pulse-dot-glow {
            0%, 100% { transform: scale(1); opacity: 0.5; box-shadow: 0 0 0 rgba(16, 185, 129, 0); }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 8px rgba(16, 185, 129, 0.8); }
        }

        .camera-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-icon-btn {
            font-size: 0.95rem;
            color: #9CA3AF;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            background: none;
            border: none;
            padding: 4px;
        }

        .card-icon-btn:hover {
            color: #FFFFFF;
            transform: scale(1.1);
        }

        /* Wrapper do Video 16:9 */
        .camera-video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #020204;
            flex-grow: 1;
        }

        .camera-video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background-color: #000;
        }

        /* Estado Vazio (Sem Câmeras) */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 80px 20px;
            text-align: center;
            color: #9CA3AF;
            flex-grow: 1;
        }

        .empty-icon {
            font-size: 3rem;
            color: #374151;
        }

        .empty-state p {
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* Rodapé Fino */
        footer {
            background-color: #06070a;
            padding: 12px 24px;
            text-align: center;
            font-size: 0.75rem;
            color: #4B5563;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-left {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .indicator-pill {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            color: #9CA3AF;
        }
    </style>
</head>
<body>

    <!-- Header Principal -->
    <header>
        <div class="header-left">
            <div class="logo-container">
                <span class="logo-icon">📺</span>
                <h1>Central de Monitoramento</h1>
            </div>
            <span class="server-badge" id="server-badge">Servidor Offline</span>
            <div class="live-clock" id="live-clock">00:00:00</div>
        </div>
        <div class="header-right">
            <button onclick="toggleSettings()"><span style="font-size:1.1rem">⚙️</span> Configurações</button>
            <button class="primary" onclick="loadActiveStreams()"><span style="font-size:1.1rem">🔄</span> Recarregar Painel</button>
        </div>
    </header>

    <!-- Sidebar de Configurações (Slide-In) -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Configurações</h2>
            <span class="close-btn" onclick="toggleSettings()">✖</span>
        </div>
        
        <div class="input-group">
            <label for="ip-input">IP do Servidor go2rtc</label>
            <input type="text" id="ip-input" placeholder="Ex: 192.168.7.12 ou 127.0.0.1">
        </div>

        <div class="input-group">
            <label for="layout-select">Layout do Grid</label>
            <select id="layout-select" onchange="changeLayout()">
                <option value="auto">Automático (Responsivo)</option>
                <option value="1">1 Coluna (Lista)</option>
                <option value="2">2 Colunas (Lado a Lado)</option>
                <option value="3">3 Colunas (Largo)</option>
            </select>
        </div>

        <button class="primary" style="margin-top: 15px; width: 100%; justify-content: center;" onclick="saveIP()">Salvar e Aplicar</button>
        <button style="width: 100%; justify-content: center;" onclick="resetIP()">Usar IP Local (127.0.0.1)</button>
    </div>

    <!-- Container Principal das Câmeras -->
    <main>
        <div class="camera-grid" id="camera-grid">
            <!-- As câmeras serão renderizadas dinamicamente aqui pelo JavaScript -->
        </div>

        <!-- Tela de carregamento ou grid vazio -->
        <div class="empty-state" id="empty-state" style="display: none;">
            <span class="empty-icon">🎥</span>
            <p id="empty-message">Procurando conexões ativas com o servidor...</p>
        </div>
    </main>

    <!-- Rodapé -->
    <footer>
        <div class="footer-left">
            <span>Servidor ativo em:</span>
            <span class="indicator-pill" id="ip-display">127.0.0.1</span>
        </div>
        <div>v3.8 Dashboard de Segurança Profissional</div>
    </footer>

    <script>
        // Carrega IP do servidor do localStorage ou assume 127.0.0.1
        let currentIP = localStorage.getItem("camera_server_ip") || "127.0.0.1";
        let currentLayout = localStorage.getItem("camera_layout_mode") || "auto";

        const cameraGrid = document.getElementById("camera-grid");
        const emptyState = document.getElementById("empty-state");
        const emptyMessage = document.getElementById("empty-message");
        const ipInput = document.getElementById("ip-input");
        const layoutSelect = document.getElementById("layout-select");
        const serverBadge = document.getElementById("server-badge");
        const ipDisplay = document.getElementById("ip-display");
        const sidebar = document.getElementById("sidebar");
        const liveClock = document.getElementById("live-clock");

        // Atualiza o relógio dinâmico a cada segundo
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('pt-BR');
            liveClock.textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Inicializa a interface
        function init() {
            if (currentIP === "localhost") {
                currentIP = "127.0.0.1";
                localStorage.setItem("camera_server_ip", "127.0.0.1");
            }
            ipInput.value = currentIP;
            ipDisplay.textContent = currentIP;
            layoutSelect.value = currentLayout;
            applyLayoutClass(currentLayout);
            loadActiveStreams();
        }

        // Abre/Fecha a barra de configurações lateral
        function toggleSettings() {
            sidebar.classList.toggle("active");
        }

        // Altera o layout do grid manualmente
        function changeLayout() {
            const mode = layoutSelect.value;
            localStorage.setItem("camera_layout_mode", mode);
            currentLayout = mode;
            applyLayoutClass(mode);
        }

        function applyLayoutClass(mode) {
            cameraGrid.className = "camera-grid"; // limpa classes
            if (mode === "1") cameraGrid.classList.add("grid-1-col");
            else if (mode === "2") cameraGrid.classList.add("grid-2-col");
            else if (mode === "3") cameraGrid.classList.add("grid-3-col");
        }

        // Salva as configurações de IP
        function saveIP() {
            let ipValue = ipInput.value.trim();
            if (ipValue === "") ipValue = "127.0.0.1";
            
            // Remove protocolos desnecessários se colados pelo usuário
            ipValue = ipValue.replace(/^(http:\/\/|https:\/\/)/, "").split(":")[0];
            
            localStorage.setItem("camera_server_ip", ipValue);
            currentIP = ipValue;
            ipDisplay.textContent = ipValue;
            
            sidebar.classList.remove("active");
            loadActiveStreams();
        }

        // Reseta o IP para 127.0.0.1
        function resetIP() {
            ipInput.value = "127.0.0.1";
            saveIP();
        }

        // Consulta a API do go2rtc e monta o painel de câmeras dinamicamente
        function loadActiveStreams() {
            cameraGrid.innerHTML = "";
            emptyState.style.display = "flex";
            emptyMessage.textContent = "Procurando conexões ativas com o servidor...";
            serverBadge.textContent = "Servidor Offline";
            serverBadge.className = "server-badge";
            
            // Requisição API
            fetch(`http://${currentIP}:1984/api/streams`)
                .then(response => {
                    if (!response.ok) throw new Error("Falha ao comunicar com a API");
                    return response.json();
                })
                .then(data => {
                    const streams = Object.keys(data);
                    
                    if (streams.length === 0) {
                        emptyMessage.textContent = "Nenhuma câmera ativa encontrada no servidor go2rtc.";
                        serverBadge.textContent = "Sem Câmeras";
                        serverBadge.classList.add("server-connected");
                        return;
                    }
                    
                    // Sucesso! Esconde tela de vazio e atualiza badge
                    emptyState.style.display = "none";
                    serverBadge.textContent = `ONLINE | ${streams.length} CAM`;
                    serverBadge.classList.add("server-connected");
                    
                    // Renderiza cada câmera
                    streams.forEach(stream => {
                        createCameraCard(stream);
                    });
                })
                .catch(error => {
                    console.error(error);
                    emptyMessage.textContent = `Não foi possível conectar ao servidor go2rtc no IP: ${currentIP}. Verifique se a Ponte RTSP está iniciada no computador.`;
                });
        }

        // Cria o elemento HTML de cada câmera dinamicamente
        function createCameraCard(streamName) {
            const card = document.createElement("div");
            card.className = "camera-card";
            card.id = `card-${streamName}`;
            
            const webrtcUrl = `http://${currentIP}:1984/webrtc.html?src=${streamName}`;
            
            card.innerHTML = `
                <div class="camera-titlebar">
                    <div class="camera-name">
                        <span class="pulse-dot"></span>
                        <span>CÂMERA: ${streamName.toUpperCase()}</span>
                    </div>
                    <div class="camera-actions">
                        <button class="card-icon-btn" title="Recarregar esta câmera" onclick="reloadCamera('${streamName}')">🔄</button>
                        <button class="card-icon-btn" title="Tela Cheia" onclick="toggleCardFullscreen('${streamName}')">📺</button>
                    </div>
                </div>
                <div class="camera-video-wrapper">
                    <iframe id="iframe-${streamName}" src="${webrtcUrl}" allowfullscreen allow="autoplay"></iframe>
                </div>
            `;
            
            cameraGrid.appendChild(card);
        }

        // Recarrega apenas uma câmera específica
        function reloadCamera(streamName) {
            const iframe = document.getElementById(`iframe-${streamName}`);
            if (iframe) {
                const src = iframe.src;
                iframe.src = "about:blank";
                setTimeout(() => {
                    iframe.src = src;
                }, 100);
            }
        }

        // Ativa tela cheia (Fullscreen) para a câmera selecionada
        function toggleCardFullscreen(streamName) {
            const card = document.getElementById(`card-${streamName}`);
            if (card) {
                if (!document.fullscreenElement) {
                    card.requestFullscreen()
                        .catch(err => {
                            alert(`Erro ao tentar ativar tela cheia: ${err.message}`);
                        });
                } else {
                    document.exitFullscreen();
                }
            }
        }

        // Inicializa ao carregar a página
        init();
    </script>
</body>
</html>
