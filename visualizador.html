<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Câmeras - Farmácia</title>
    <style>
        /* Estilos do Tema Escuro Premium */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background-color: #0D0E12;
            color: #F3F4F6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Header */
        header {
            background-color: #161822;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1F2937;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .logo-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-title h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .badge {
            background-color: #3B82F6;
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 9999px;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Botões */
        button {
            background-color: #1F2937;
            color: #F3F4F6;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #374151;
        }

        button.primary {
            background-color: #3B82F6;
        }

        button.primary:hover {
            background-color: #2563EB;
        }

        /* Painel de Configurações (IP) */
        .settings-panel {
            background-color: #161822;
            border-bottom: 1px solid #1F2937;
            padding: 15px 25px;
            display: none;
            animation: slideDown 0.3s ease-out forwards;
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .settings-content {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .settings-content label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #9CA3AF;
        }

        .settings-content input {
            background-color: #0D0E12;
            border: 1px solid #374151;
            color: #F3F4F6;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            min-width: 200px;
            outline: none;
            transition: border-color 0.2s;
        }

        .settings-content input:focus {
            border-color: #3B82F6;
        }

        /* Grid de Câmeras */
        .camera-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
            gap: 20px;
            padding: 20px;
            flex-grow: 1;
            align-items: center;
        }

        @media (max-width: 1024px) {
            .camera-container {
                grid-template-columns: 1fr;
            }
        }

        .camera-card {
            background-color: #161822;
            border-radius: 8px;
            border: 1px solid #1F2937;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            height: 100%;
            min-height: 360px;
        }

        .camera-titlebar {
            background-color: #1F2937;
            padding: 10px 15px;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #E5E7EB;
        }

        .camera-iframe-wrapper {
            position: relative;
            flex-grow: 1;
            width: 100%;
            height: 0;
            padding-bottom: 56.25%; /* Aspect Ratio 16:9 */
            background-color: #000;
        }

        .camera-iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Rodapé de Informações */
        footer {
            background-color: #0D0E12;
            padding: 15px;
            text-align: center;
            font-size: 0.8rem;
            color: #6B7280;
            border-top: 1px solid #1F2937;
        }

        .ip-badge {
            background-color: #1F2937;
            color: #9CA3AF;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo-title">
            <h1>📺 Monitor Câmeras Farmácia</h1>
            <span class="badge" id="srv-badge">Servidor: Local</span>
        </div>
        <div class="controls">
            <button onclick="toggleSettings()" id="btn-settings">⚙️ Configurar IP</button>
            <button class="primary" onclick="reloadStreams()">🔄 Recarregar Câmeras</button>
        </div>
    </header>

    <!-- Painel de Configurações de IP -->
    <div class="settings-panel" id="settings-panel">
        <div class="settings-content">
            <label for="ip-input">IP do Computador da Câmera (Servidor):</label>
            <input type="text" id="ip-input" placeholder="Ex: 192.168.7.12 ou localhost">
            <button class="primary" onclick="saveIP()">Salvar e Conectar</button>
            <button onclick="resetIP()">Usar Localhost</button>
        </div>
    </div>

    <!-- Container das Câmeras -->
    <div class="camera-container">
        <!-- Câmera 1 -->
        <div class="camera-card">
            <div class="camera-titlebar">
                <span>🟢 CÂMERA 1 - FARMÁCIA</span>
                <span class="badge" style="background-color: #059669;">AO VIVO</span>
            </div>
            <div class="camera-iframe-wrapper">
                <iframe id="iframe-c1" src="about:blank" allowfullscreen></iframe>
            </div>
        </div>

        <!-- Câmera 2 -->
        <div class="camera-card">
            <div class="camera-titlebar">
                <span>🟢 CÂMERA 2 - FARMÁCIA</span>
                <span class="badge" style="background-color: #059669;">AO VIVO</span>
            </div>
            <div class="camera-iframe-wrapper">
                <iframe id="iframe-c2" src="about:blank" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <!-- Rodapé -->
    <footer>
        Conectado ao go2rtc via IP local: <span class="ip-badge" id="ip-display">localhost</span> | Desenvolvido para Farmácia v2.5
    </footer>

    <script>
        // Carrega o IP salvo ou assume localhost
        let currentIP = localStorage.getItem("camera_server_ip") || "localhost";
        
        // Elementos da página
        const ipInput = document.getElementById("ip-input");
        const srvBadge = document.getElementById("srv-badge");
        const ipDisplay = document.getElementById("ip-display");
        const iframeC1 = document.getElementById("iframe-c1");
        const iframeC2 = document.getElementById("iframe-c2");
        const settingsPanel = document.getElementById("settings-panel");

        // Inicializa a página
        function init() {
            ipInput.value = currentIP;
            ipDisplay.textContent = currentIP;
            
            if (currentIP === "localhost" || currentIP === "127.0.0.1") {
                srvBadge.textContent = "Servidor: Local";
                srvBadge.style.backgroundColor = "#3B82F6";
            } else {
                srvBadge.textContent = "Servidor: " + currentIP;
                srvBadge.style.backgroundColor = "#10B981";
            }
            
            // Carrega as streams nos iframes
            loadStreams();
        }

        // Define a URL dos iframes
        function loadStreams() {
            iframeC1.src = `http://${currentIP}:1984/webrtc.html?src=farmacia`;
            iframeC2.src = `http://${currentIP}:1984/webrtc.html?src=farmacia2`;
        }

        // Abre/Fecha painel de configurações
        function toggleSettings() {
            if (settingsPanel.style.display === "block") {
                settingsPanel.style.display = "none";
            } else {
                settingsPanel.style.display = "block";
                ipInput.focus();
            }
        }

        // Salva o novo IP
        function saveIP() {
            let ipValue = ipInput.value.trim();
            if (ipValue === "") ipValue = "localhost";
            
            // Remove espaços e protocolos se o usuário colar algo como http://
            ipValue = ipValue.replace(/^(http:\/\/|https:\/\/)/, "").split(":")[0];
            
            localStorage.setItem("camera_server_ip", ipValue);
            currentIP = ipValue;
            
            // Fecha painel e reinicia
            settingsPanel.style.display = "none";
            init();
        }

        // Reseta o IP para localhost
        function resetIP() {
            localStorage.setItem("camera_server_ip", "localhost");
            currentIP = "localhost";
            ipInput.value = "localhost";
            settingsPanel.style.display = "none";
            init();
        }

        // Força recarregar os iframes (atualizar stream)
        function reloadStreams() {
            const src1 = iframeC1.src;
            const src2 = iframeC2.src;
            iframeC1.src = "about:blank";
            iframeC2.src = "about:blank";
            setTimeout(() => {
                iframeC1.src = src1;
                iframeC2.src = src2;
            }, 100);
        }

        // Inicia
        init();
    </script>
</body>
</html>
